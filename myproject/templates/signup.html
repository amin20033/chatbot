{% extends "base.html" %} {% block title %}Signup{% endblock title %} {% block main %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body">
          <h4 class="text-center mb-4">Signup</h4>
          <form id="signupForm">
            {% csrf_token %}
            <div id="msg"></div>
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input
                type="text"
                name="username"
                id="username"
                class="form-control"
                placeholder="Enter Username"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                placeholder="Enter Password"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input
                type="password"
                name="cpassword"
                id="cpassword"
                class="form-control"
                placeholder="Enter Confirm Password"
              />
            </div>
            <button class="signupBtn">Signup</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock main %}
